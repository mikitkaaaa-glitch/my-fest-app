<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фестивальный Гид</title>
    <!-- Подключаем официальный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0e15;
            --card-bg: #181a26;
            --accent-color: #bc00dd;
            --text-color: #ffffff;
            --text-muted: #8e92a7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* Отступ снизу для меню */
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            background: linear-gradient(135deg, #1f1235 0%, #0d0e15 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #251c3d;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #7928ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Навигация по экранам (Нижнее меню) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #2d3142;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-btn.active {
            color: var(--accent-color);
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Контентные экраны */
        .screen {
            display: none;
            padding: 15px;
        }

        .screen.active {
            display: block;
        }

        /* Стили для Расписания */
        .scene-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .scene-btn {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid #2d3142;
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .scene-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .event-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid var(--accent-color);
        }

        .event-time {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
            min-width: 55px;
        }

        .event-info h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
        }

        .event-info p {
            margin: 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Стили для Карты */
        .map-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            border: 2px dashed #2d3142;
            margin-top: 20px;
        }

        /* Стили для Мастер-классов */
        .action-btn {
            background: linear-gradient(45deg, #bc00dd, #ff007f);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="fest-title">FESTIVAL 2026</h1>
        <p>Ваш интерактивный мобильный гид</p>
    </header>

    <!-- ЭКРАН 1: РАСПИСАНИЕ -->
    <div id="screen-schedule" class="screen active">
        <div class="scene-selector">
            <button class="scene-btn active" onclick="switchScene('main')">Главная сцена</button>
            <button class="scene-btn" onclick="switchScene('electronic')">Электро Сцена</button>
        </div>
        
        <div id="schedule-list">
            <!-- Сюда будут подставляться карточки -->
        </div>
    </div>

    <!-- ЭКРАН 2: КАРТА -->
    <div id="screen-map" class="screen">
        <h2>Карта фестиваля</h2>
        <div class="map-container">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#bc00dd" stroke-width="2">
                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                <line x1="9" y1="3" x2="9" y2="18"></line>
                <line x1="15" y1="6" x2="15" y2="21"></line>
            </svg>
            <p style="margin-top: 15px;">Здесь будет интерактивная схема площадки.</p>
            <p style="font-size: 12px; color: var(--text-muted);">Фуд-корты, сцены, инфоцентр и уборные.</p>
        </div>
    </div>

    <!-- ЭКРАН 3: АКТИВНОСТИ -->
    <div id="screen-activities" class="screen">
        <h2>Мастер-классы</h2>
        <div class="event-card" style="flex-direction: column; align-items: flex-start; border-left-color: #00f0ff;">
            <div style="display: flex; justify-content: space-between; width: 100%;">
                <span style="color: #00f0ff; font-weight: bold;">14:00 - 15:30</span>
                <span style="color: var(--text-muted);">Осталось мест: 8</span>
            </div>
            <h3>DJ-инг для новичков</h3>
            <p>Практический воркшоп: учимся сводить треки на оборудовании Pioneer.</p>
            <button class="action-btn" style="background: #00f0ff; color: #0d0e15;" onclick="signUp(this, 'DJ-инг')">Записаться</button>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="switchScreen('schedule', this)">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            Расписание
        </button>
        <button class="nav-btn" onclick="switchScreen('map', this)">
            <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5c.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
            Карта
        </button>
        <button class="nav-btn" onclick="switchScreen('activities', this)">
            <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.49 12踩L3 10.64l9-4.9 9 4.9-2.49 1.36L12 9.3 5.49 12z"/></svg>
            Воркшопы
        </button>
    </nav>

    <script>
        // Инициализируем Telegram WebApp, если открыто в ТГ
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand(); // Разворачиваем на весь экран телефона
            // Приветствуем пользователя по имени из Telegram
            if (tg.initDataUnsafe?.user) {
                document.getElementById('fest-title').innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;
            }
        }

        // Данные для расписания (имитация базы данных)
        const events = {
            main: [
                { time: "16:00", artist: "Открытие ворот", desc: "Старт фестиваля, сбор гостей" },
                { time: "18:00", artist: "Инди-группа 'Закат'", desc: "Летний софт-рок" },
                { time: "21:00", artist: "Хедлайнер Вечера", desc: "Масштабное световое шоу" }
            ],
            electronic: [
                { time: "17:00", artist: "DJ Mikitka", desc: "Minimal / House сет" },
                { time: "19:30", artist: "SZN", desc: "Deep & Tech House" },
                { time: "22:00", artist: "NZH", desc: "Drum & Bass ночной разнос" }
            ]
        };

        // Логика переключения экранов
        function switchScreen(screenId, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`screen-${screenId}`).classList.add('active');
            btn.classList.add('active');
        }

        // Логика переключения сцен
        function switchScene(sceneId) {
            document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderSchedule(sceneId);
        }

        // Отрисовка расписания на экране
        function renderSchedule(sceneId) {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            events[sceneId].forEach(item => {
                list.innerHTML += `
                    <div class="event-card">
                        <div class="event-time">${item.time}</div>
                        <div class="event-info">
                            <h3>${item.artist}</h3>
                            <p>${item.desc}</p>
                        </div>
                    </div>
                `;
            });
        }

        // Кнопка записи
        function signUp(btn, name) {
            btn.innerText = "Вы записаны!";
            btn.style.background = "#505050";
            btn.style.color = "#ffffff";
            btn.disabled = true;
            if (tg) {
                tg.showAlert(`Отлично! Вы успешно записались на мастер-класс: ${name}`);
            } else {
                alert(`Успешная запись на: ${name}`);
            }
        }

        // Первичный запуск расписания
        renderSchedule('main');
    </script>
</body>
</html>
